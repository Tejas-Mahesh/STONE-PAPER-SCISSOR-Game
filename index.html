<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>STONE PAPER SCISSOR</h1>

        <div class="game-buttons">
            <button class="choice-btn" onclick="playGame('STONE')">
                ✊
                <span>STONE</span>
            </button>

            <button class="choice-btn" onclick="playGame('PAPER')">
                ✋
                <span>PAPER</span>
            </button>

            <button class="choice-btn" onclick="playGame('SCISSOR')">
                ✌️
                <span>SCISSOR</span>
            </button>
        </div>

        <div class="result-box">
            <h2 id="result">Start The Game</h2>
            <p id="moves"></p>
        </div>

        <div class="score-board">
            <div class="score-card">
                <h3 id="win">0</h3>
                <p>Wins</p>
            </div>

            <div class="score-card">
                <h3 id="lost">0</h3>
                <p>Lost</p>
            </div>

            <div class="score-card">
                <h3 id="tie">0</h3>
                <p>Ties</p>
            </div>
        </div>

        <button class="reset-btn" onclick="resetScore()">
            Reset Score
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
